<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GRC Intelligence</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#E8A020" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Apply theme before first paint. Theme is session-scoped so every new visit starts light. -->
    <script>
      (function () {
        try {
          // Clear any legacy localStorage theme keys from old versions
          localStorage.removeItem('grc:ui:theme');
          localStorage.removeItem('grc:ui:theme-v2');
          localStorage.removeItem('grc:ui:theme-v3');
          // Apply dark only if user toggled it in this session
          if (sessionStorage.getItem('grc:theme') === 'dark') {
            document.documentElement.classList.replace('light', 'dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
